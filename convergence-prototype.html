<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convergence Animation Prototype</title>
  <style>
    body {
      margin: 0;
      background: #0d1b1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .convergence-container {
      position: relative;
      width: min(450px, 85vw);
      height: min(450px, 85vw);
      border-radius: 50%;
      overflow: hidden;
    }

    .map-bg {
      position: absolute;
      inset: 0;
      background-image: url('charleston-map.png');
      background-size: cover;
      background-position: center;
      opacity: 0.15;
    }

    canvas {
      position: relative;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="convergence-container">
    <div class="map-bg"></div>
    <canvas id="convergence"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('convergence');
    const ctx = canvas.getContext('2d');

    const dpr = window.devicePixelRatio || 1;
    let W, H, cx, cy;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      cx = W / 2;
      cy = H / 2;
    }

    resize();
    window.addEventListener('resize', resize);

    // Load tube images
    const tubeSrcs = [
      'animation/tube-1.png',
      'animation/tube-2.png',
      'animation/tube-3.png',
      'animation/tube-4.png',
      'animation/tube-5.png',
      'animation/tube-6.png',
    ];
    const tubeImages = [];
    let tubesLoaded = 0;

    tubeSrcs.forEach(src => {
      const img = new Image();
      img.onload = () => { tubesLoaded++; };
      img.src = src;
      tubeImages.push(img);
    });

    // --- CONFIG ---
    const NUM_DOTS = 90;               // number of tube images scattered in the circle
    const FADE_IN = 800;               // ms — how long the whole scene fades in at cycle start
    const CONVERGE_DURATION = 9000;    // ms — the breathing + squeezing phase (one continuous arc)
    const HOLD_DURATION = 1000;        // ms — how long the frozen blob sits on screen
    const FADE_OUT = 2200;             // ms — how long the whole scene fades out at cycle end
    const PAUSE = 600;                 // ms — gap between cycles (blank screen)
    const TOTAL_CYCLE = FADE_IN + CONVERGE_DURATION + HOLD_DURATION + FADE_OUT + PAUSE;

    const CIRCLE_START_RADIUS = 0.46;      // starting circle size (0–0.5, where 0.5 = edge of canvas)
    const CIRCLE_END_RADIUS = 0.08;       // final blob size — circle and tubes share this
    const TUBE_PADDING = 0.03;            // tubes sit this far inside the circle edge
    const CENTER_PULL = 0.008;            // gravity toward center — higher = less donut, more blob
    const BREATHE_CYCLE_MS = 1167;        // ms per breath cycle — higher = slower, calmer rhythm
    const BREATHE_AMPLITUDE = 0.045;      // how far circle expands/contracts each breath

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // --- DOTS ---
    function generateDots() {
      const dots = [];
      for (let i = 0; i < NUM_DOTS; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 0.42;
        dots.push({
          x: 0.5 + Math.cos(angle) * dist,
          y: 0.5 + Math.sin(angle) * dist,
          size: 24 + Math.random() * 14,
          imgIndex: Math.floor(Math.random() * tubeSrcs.length),
          rotation: (Math.random() - 0.5) * 0.6,
          rotSpeed: (Math.random() - 0.5) * 0.0003,
          phase: Math.random() * Math.PI * 2,
          driftX: (Math.random() - 0.5) * 0.0002,
          driftY: (Math.random() - 0.5) * 0.0002,
        });
      }
      return dots;
    }

    let dots = generateDots();
    let cycleStart = performance.now();

    // --- ANIMATION ---
    function animate(now) {
      const elapsed = (now - cycleStart) % TOTAL_CYCLE;

      // Regenerate dots at start of each new cycle
      if (Math.floor((now - cycleStart) / TOTAL_CYCLE) > 0 && elapsed < 20) {
        dots = generateDots();
      }

      ctx.clearRect(0, 0, W, H);
      if (tubesLoaded < tubeSrcs.length) { requestAnimationFrame(animate); return; }

      // --- PHASE CALCULATION ---
      let globalAlpha = 1;
      let squeezeAmount = 0;
      let breathe = 0;

      if (elapsed < FADE_IN) {
        globalAlpha = elapsed / FADE_IN;
      } else if (elapsed < FADE_IN + CONVERGE_DURATION) {
        const t = (elapsed - FADE_IN) / CONVERGE_DURATION;
        squeezeAmount = easeInOutCubic(t);
        // Breathing: continuous sine, fades out naturally
        // 1.7 controls when breathing dies — lower = lingers longer, higher = fades sooner
        const breatheFade = Math.max(0, 1 - t * 1.7);
        breathe = Math.sin((elapsed - FADE_IN) * 2 * Math.PI / BREATHE_CYCLE_MS) * BREATHE_AMPLITUDE * breatheFade;
      } else if (elapsed < FADE_IN + CONVERGE_DURATION + HOLD_DURATION) {
        squeezeAmount = 1;
      } else if (elapsed < FADE_IN + CONVERGE_DURATION + HOLD_DURATION + FADE_OUT) {
        squeezeAmount = 1;
        const t = (elapsed - FADE_IN - CONVERGE_DURATION - HOLD_DURATION) / FADE_OUT;
        globalAlpha = 1 - easeInOutCubic(t);
      } else {
        globalAlpha = 0;
      }

      // --- CIRCLE RADIUS (shared by visual + boundary) ---
      const radius = CIRCLE_START_RADIUS + (CIRCLE_END_RADIUS - CIRCLE_START_RADIUS) * squeezeAmount - breathe;
      const circleRadiusPx = radius * Math.min(W, H);

      ctx.save();
      ctx.globalAlpha = globalAlpha;

      // --- DRAW CIRCLE — fades during last 15% of squeeze ---
      // 0.85 = when fade starts (% through squeeze), 0.15 = fade duration (remaining %)
      const circleFade = squeezeAmount > 0.85 ? 1 - (squeezeAmount - 0.85) / 0.15 : 1;
      if (circleFade > 0.001) {
        ctx.beginPath();
        ctx.arc(cx, cy, circleRadiusPx, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(240, 247, 244, ${0.2 * circleFade})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // --- DRAW TUBES ---
      const frozen = squeezeAmount >= 1;

      for (const dot of dots) {
        if (!frozen) {
          // Drift — fades as squeeze progresses
          // 1.5 = how fast drift dies (higher = stops earlier in the squeeze)
          const driftScale = Math.max(0, 1 - squeezeAmount * 1.5);
          dot.x += dot.driftX * driftScale;
          dot.y += dot.driftY * driftScale;
          dot.rotation += dot.rotSpeed * driftScale;

          // Center pull — fills interior so it's not a donut
          // Only pulls tubes that are outside the final blob radius
          const dxPull = dot.x - 0.5;
          const dyPull = dot.y - 0.5;
          const distFromCenter = Math.sqrt(dxPull * dxPull + dyPull * dyPull);
          const blobRadius = CIRCLE_END_RADIUS - TUBE_PADDING;
          if (squeezeAmount > 0 && distFromCenter > blobRadius) {
            const pull = squeezeAmount * squeezeAmount * CENTER_PULL;
            dot.x += (0.5 - dot.x) * pull;
            dot.y += (0.5 - dot.y) * pull;
          }

          // Boundary enforcement — circle pushes tubes inward
          const dx = dot.x - 0.5;
          const dy = dot.y - 0.5;
          const d = Math.sqrt(dx * dx + dy * dy);
          const maxDist = radius - TUBE_PADDING;
          if (maxDist > 0 && d > maxDist) {
            dot.x = 0.5 + (dx / d) * maxDist;
            dot.y = 0.5 + (dy / d) * maxDist;
          }
        }

        // Render — each tube has a subtle size pulse that fades as squeeze completes
        const pulseScale = Math.max(0, 1 - squeezeAmount);
        const pulse = 1 + Math.sin(now * 0.002 + dot.phase) * 0.12 * pulseScale; // 0.12 = pulse intensity
        const s = dot.size * pulse;

        if (s > 1) {
          const img = tubeImages[dot.imgIndex];
          const aspect = img.naturalWidth / img.naturalHeight;
          ctx.save();
          ctx.translate(dot.x * W, dot.y * H);
          ctx.rotate(dot.rotation);
          ctx.globalAlpha = globalAlpha * (pulseScale > 0 ? Math.min(1, 0.7 + pulse * 0.15) : 1);
          ctx.drawImage(img, -s * aspect / 2, -s / 2, s * aspect, s);
          ctx.restore();
        }
      }

      ctx.restore();
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
